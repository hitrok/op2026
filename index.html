<body>
<div class="boot" id="boot"><div class="spinner"></div></div>

<div id="app">
  <header class="header">
    <div class="header-top">
      <div class="brand">
        <h1>大分市プレミアム付き商品券2026</h1>
        <div class="count" id="count">加盟店マップ・読み込み中…</div>
      </div>
      <button class="icon-btn" id="aboutBtn" aria-label="このサイトについて" title="このサイトについて">

      </button>
      <button class="icon-btn" id="refreshBtn" aria-label="最新データに更新" title="最新データに更新">

    </div>

    <div class="controls-row">
      <div class="segmented" id="seg" role="tablist">
        <button data-view="map" class="active" role="tab">地図</button>
        <button data-view="list" role="tab">リスト</button>
      </div>
      <a class="credit" id="creditLink" href="https://plan8.jp" target="_blank" rel="noopener" title="株式会社plan8のWebサイトへ">制作 <b>plan8</b>
        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M7 17 17 7M9 7h8v8"/></svg>
      </a>
    </div>

    <div class="search-wrap">
      <svg class="s-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><circle cx="11" cy="11" r="7"/><path d="m21 21-4.3-4.3"/></svg>
      <input id="search" type="search" placeholder="店名・住所・業種で検索" inputmode="search" autocomplete="off" enterkeyhint="search">

      </button>
    </div>

    <div class="chips" id="chips"></div>

    <button class="adv-toggle" id="advToggle">
      絞り込み
      <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.4" stroke-linecap="round" stroke-linejoin="round"><path d="m6 9 6 6 6-6"/></svg>
    </button>
    <div class="adv-panel" id="advPanel">
      <select id="minorSelect" aria-label="業種で絞り込み"><option value="">すべての業種</option></select>
      <label class="toggle-row">デジタル対応のみ
        <span class="switch"><input type="checkbox" id="digitalOnly"><span class="track"><span class="thumb"></span></span></span>
      </label>
    </div>
  </header>

  <main class="main">
    <div id="map"></div>
    <div class="list-view" id="listView"></div>
    <button class="fab" id="locFab" aria-label="現在地へ移動" title="現在地へ移動">
